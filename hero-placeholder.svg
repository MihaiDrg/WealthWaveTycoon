<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" width="360" height="720" role="img" aria-label="WealthWave Idle Tycoon app screen placeholder on a phone">
  <defs>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16213A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="360" height="720" rx="42" fill="url(#screenBg)"/>
  <rect x="14" y="14" width="332" height="692" rx="30" fill="#0F172A" stroke="#25324A" stroke-width="1"/>

  <!-- status/header -->
  <text x="34" y="58" font-family="Georgia, serif" font-size="20" fill="#FFD700">WealthWave</text>
  <text x="34" y="78" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Idle Tycoon</text>

  <!-- balance card -->
  <rect x="30" y="100" width="300" height="90" rx="16" fill="#141F38" stroke="#26314D"/>
  <text x="50" y="132" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" letter-spacing="1">NET WORTH</text>
  <text x="50" y="164" font-family="'Courier New', monospace" font-size="28" fill="#FFD700">$1,284,902</text>

  <!-- passive income row -->
  <rect x="30" y="204" width="300" height="52" rx="14" fill="#101B33"/>
  <text x="46" y="235" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1">Passive Income / sec</text>
  <text x="284" y="235" text-anchor="end" font-family="'Courier New', monospace" font-size="13" fill="#34D399">+$1,204</text>

  <!-- business rows -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#E2E8F0">
    <rect x="30" y="272" width="300" height="60" rx="14" fill="#0F1B31" stroke="#22304D"/>
    <circle cx="58" cy="302" r="14" fill="#FFD700" opacity="0.15"/>
    <text x="82" y="298">Coffee Shop Chain</text>
    <text x="82" y="315" fill="#8493AB" font-size="10">Level 24</text>
    <text x="308" y="306" text-anchor="end" fill="#FFD700">UPGRADE</text>

    <rect x="30" y="342" width="300" height="60" rx="14" fill="#0F1B31" stroke="#22304D"/>
    <circle cx="58" cy="372" r="14" fill="#34D399" opacity="0.15"/>
    <text x="82" y="368">Real Estate Fund</text>
    <text x="82" y="385" fill="#8493AB" font-size="10">Level 11</text>
    <text x="308" y="376" text-anchor="end" fill="#FFD700">UPGRADE</text>

    <rect x="30" y="412" width="300" height="60" rx="14" fill="#0F1B31" stroke="#22304D"/>
    <circle cx="58" cy="442" r="14" fill="#FFD700" opacity="0.15"/>
    <text x="82" y="438">Tech Startup</text>
    <text x="82" y="455" fill="#8493AB" font-size="10">Level 7</text>
    <text x="308" y="446" text-anchor="end" fill="#FFD700">UPGRADE</text>
  </g>

  <!-- prestige button -->
  <rect x="30" y="492" width="300" height="54" rx="27" fill="url(#goldBar)"/>
  <text x="180" y="525" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#0F172A">ASCEND FOR LEGACY</text>

  <!-- big tap coin -->
  <circle cx="180" cy="630" r="58" fill="#141F38" stroke="url(#goldBar)" stroke-width="3"/>
  <text x="180" y="642" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#FFD700">$</text>

  <!-- notch -->
  <rect x="140" y="26" width="80" height="18" rx="9" fill="#0B1220"/>
</svg>
